<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-72 rounded-[30px] overflow-hidden shadow-2xl bg-white border-4 border-pink-300">
    
    <!-- Header Image -->
    <div class="h-40 bg-cover bg-center"
      style="background-image: url('fondo.jpeg');">
    </div>

    <!-- Avatar -->
    <div class="flex justify-center -mt-14">
      <div class="w-28 h-28 rounded-full bg-white p-2 shadow-lg">
        <img
          src="avatar.png"
          alt="avatar"
          class="w-full h-full rounded-full object-cover"
        />
      </div>
    </div>

    <!-- Content -->
    <div class="text-center px-6 pb-8">

      <h2 class="text-2xl font-bold text-gray-700 mt-3">
        Morgan Sweeney
      </h2>

      <p class="text-gray-400 text-sm mb-6">
        Ant Collector
      </p>

      <!-- Stats -->
      <div class="flex justify-center gap-12 mb-6">
        <div>
          <h3 class="text-blue-500 font-bold text-2xl">12</h3>
          <p class="text-gray-400 text-sm">Followers</p>
        </div>

        <div>
          <h3 class="text-blue-500 font-bold text-2xl">1000</h3>
          <p class="text-gray-400 text-sm">Following</p>
        </div>
      </div>

      <!-- Button -->
      <button
        class="bg-yellow-400 hover:bg-yellow-500 transition text-black font-semibold px-16 py-3 rounded-full shadow-md mb-6">
        Follow
      </button>

      <!-- Description -->
      <p class="text-gray-500 text-sm leading-relaxed">
        Morgan has collected ants since they were six years old and now has many dozen ants but none in their pants.
      </p>

    </div>
  </div>

</body>
</html>
